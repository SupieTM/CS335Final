<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror Room - Real-Time Ray Tracer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #ddd; }

        #renderCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        /* crosshair */
        #crosshairOverlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            width: 24px; height: 24px;
        }
        #crosshairOverlay::before,
        #crosshairOverlay::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 4px rgba(255,255,255,0.5);
        }
        #crosshairOverlay::before { width: 18px; height: 2px; top: 11px; left: 3px; }
        #crosshairOverlay::after  { width: 2px; height: 18px; top: 3px; left: 11px; }

        /* fps */
        #fpsDisplay {
            position: fixed;
            top: 12px; right: 16px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-family: 'Consolas', monospace;
            z-index: 20;
            pointer-events: none;
            background: rgba(10,8,16,0.6);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* control panel */
        #controlPanel {
            position: fixed;
            top: 12px; left: 16px;
            background: rgba(10, 8, 16, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px 16px;
            z-index: 60;
            font-size: 12px;
            min-width: 240px;
            backdrop-filter: blur(10px);
            transition: opacity 0.2s;
        }
        #controlPanel.hidden { opacity: 0; pointer-events: none; }
        #controlPanel h3 {
            margin-bottom: 10px;
            font-size: 13px;
            color: #fff;
            letter-spacing: 1.2px;
            font-weight: 600;
        }
        #controlPanel .sectionLabel {
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin: 10px 0 6px 0;
        }

        .controlRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 7px;
        }
        .controlRow label { flex: 1; color: rgba(255,255,255,0.7); }
        .controlRow input[type="range"] { width: 110px; }
        .controlRow input[type="color"] {
            width: 28px; height: 18px; border: none; padding: 0;
            background: transparent; cursor: pointer;
        }
        .controlRow select {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .controlRow span.valueLabel {
            min-width: 32px;
            text-align: right;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
        }

        #resetMirrorsButton {
            width: 100%;
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(255, 60, 100, 0.15);
            color: #ff789e;
            border: 1px solid rgba(255, 60, 100, 0.4);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        #resetMirrorsButton:hover { background: rgba(255, 60, 100, 0.25); }

        /* keybind card - always visible in the corner */
        #keybindCard {
            position: fixed;
            bottom: 14px; left: 16px;
            background: rgba(10, 8, 16, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            padding: 10px 14px;
            z-index: 60;
            font-size: 11px;
            font-family: 'Consolas', monospace;
            color: rgba(255,255,255,0.6);
            line-height: 1.75;
            backdrop-filter: blur(6px);
        }
        #keybindCard .keybindKey {
            display: inline-block;
            min-width: 22px;
            text-align: center;
            padding: 1px 5px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 3px;
            color: #fff;
            margin-right: 6px;
        }

        /* click to play overlay - shown whenever pointer lock is not held */
        #pointerLockOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(3px);
            cursor: pointer;
            transition: opacity 0.25s;
        }
        #pointerLockOverlay.hidden { opacity: 0; pointer-events: none; }
        #pointerLockOverlay .overlayInner {
            text-align: center;
            padding: 28px 40px;
            background: rgba(15, 12, 22, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            max-width: 420px;
        }
        #pointerLockOverlay h1 {
            font-size: 22px;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 300;
        }
        #pointerLockOverlay .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 18px;
            letter-spacing: 1px;
        }
        #pointerLockOverlay .clickPrompt {
            font-size: 13px;
            color: #ff789e;
            letter-spacing: 1.5px;
            font-family: 'Consolas', monospace;
        }

        #doorPrompt {
            position: fixed;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 40;
            background: rgba(12, 10, 18, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 12px;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Consolas', monospace;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            transition: opacity 0.12s;
        }
        #doorPrompt.hidden { opacity: 0; }
        #doorPrompt .doorPromptKey {
            display: inline-block;
            min-width: 18px;
            text-align: center;
            padding: 1px 6px;
            background: rgba(255, 120, 158, 0.2);
            border: 1px solid rgba(255, 120, 158, 0.6);
            border-radius: 3px;
            color: #ffb0c5;
            margin-right: 8px;
        }

        #errorDisplay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-width: 80vw;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="crosshairOverlay"></div>
    <div id="fpsDisplay">-- FPS</div>
    <div id="errorDisplay"></div>

    <div id="doorPrompt" class="hidden">
        <span class="doorPromptKey">E</span><span class="doorPromptLabel">open door</span>
    </div>

    <div id="controlPanel">
        <h3>MIRROR ROOM</h3>

        <div class="sectionLabel">Rendering</div>
        <div class="controlRow">
            <label>Bounces</label>
            <input type="range" id="bounceCountSlider" min="1" max="15" value="12">
            <span class="valueLabel" id="bounceCountLabel">12</span>
        </div>
        <div class="controlRow">
            <label>Room</label>
            <select id="roomLayoutSelector">
                <option value="corridor">Corridor</option>
                <option value="labyrinth">Labyrinth</option>
                <option value="doors">Mirror Doors</option>
                <option value="openRoom">Open Room</option>
                <option value="angled">Hexagonal</option>
            </select>
        </div>
        <div class="controlRow">
            <label>Bloom</label>
            <input type="range" id="bloomStrengthSlider" min="0" max="40" value="14">
            <span class="valueLabel" id="bloomStrengthLabel">1.4</span>
        </div>
        <div class="controlRow">
            <label>Threshold</label>
            <input type="range" id="bloomThresholdSlider" min="2" max="30" value="10">
            <span class="valueLabel" id="bloomThresholdLabel">1.0</span>
        </div>

        <div class="sectionLabel">Controls</div>
        <div class="controlRow">
            <label>Sensitivity</label>
            <input type="range" id="mouseSensitivitySlider" min="1" max="50" value="20">
            <span class="valueLabel" id="mouseSensitivityLabel">2.0</span>
        </div>
        <div class="controlRow">
            <label>FOV</label>
            <input type="range" id="fovSlider" min="60" max="110" value="90">
            <span class="valueLabel" id="fovLabel">90</span>
        </div>

        <div class="sectionLabel">Neon Lights</div>
        <div class="controlRow">
            <label>Light 1</label>
            <input type="color" id="lightColor0" value="#ff2a9e">
        </div>
        <div class="controlRow">
            <label>Light 2</label>
            <input type="color" id="lightColor1" value="#3aa0ff">
        </div>
        <div class="controlRow">
            <label>Light 3</label>
            <input type="color" id="lightColor2" value="#3dff66">
        </div>

        <button id="resetMirrorsButton">REPAIR MIRRORS</button>
    </div>

    <div id="keybindCard">
        <div><span class="keybindKey">WASD</span> Move</div>
        <div><span class="keybindKey">Mouse</span> Look</div>
        <div><span class="keybindKey">Shift</span> Sprint</div>
        <div><span class="keybindKey">Click</span> Shatter mirror</div>
        <div><span class="keybindKey">E</span> Open mirror door</div>
        <div><span class="keybindKey">F</span> Muzzle flash</div>
        <div><span class="keybindKey">R</span> Repair mirrors</div>
        <div><span class="keybindKey">Tab</span> Hide UI</div>
        <div><span class="keybindKey">Esc</span> Release mouse</div>
    </div>

    <div id="pointerLockOverlay">
        <div class="overlayInner">
            <h1>MIRROR ROOM</h1>
            <div class="subtitle">Real-Time Recursive Ray Tracer</div>
            <div class="clickPrompt">&gt; CLICK TO ENTER &lt;</div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
